name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Installer les dépendances
      run: |
        pip install -r requirements.txt

    - name: Lancer les tests
      run: |
        pytest